name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish npm package and GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package version
        id: package
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Check formatting
        run: npx prettier --check .

      - name: Pack package
        id: pack
        shell: bash
        run: |
          TARBALL=$(npm pack --silent)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          cat > release-notes.md <<EOF
          Published $PACKAGE_NAME v$PACKAGE_VERSION.

          - npm: https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION
          - Install: \`pi install npm:$PACKAGE_NAME\`
          EOF

          gh release create "$GITHUB_REF_NAME" "$TARBALL" \
            --title "$PACKAGE_NAME v$PACKAGE_VERSION" \
            --notes-file release-notes.md
